name: Deploy to prod

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: true

# Runtime uses the system Chrome (PUPPETEER_EXECUTABLE_PATH); никогда не качаем
# бандл Chromium при npm ci — иначе установка висит минутами.
env:
  PUPPETEER_SKIP_DOWNLOAD: "true"
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"

jobs:
  gate:
    name: Build gate (typecheck + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run test:quality
      - run: npm run typecheck
      - run: npm run build

  deploy:
    name: Deploy over SSH
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Run deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /opt/gov-strategy-ai
            git fetch origin
            git show origin/main:scripts/deploy.sh | bash
